<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICAN UiTM Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a', /* Slate 900 */
                        cardBg: '#1e293b', /* Slate 800 */
                        accentBlue: '#3b82f6', /* Blue 500 */
                        accentBlueHover: '#2563eb', /* Blue 600 */
                        textMain: '#f8fafc', /* Slate 50 */
                        textMuted: '#94a3b8', /* Slate 400 */
                        borderDark: '#334155' /* Slate 700 */
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        /* Custom Scrollbar minimalis */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-cardBg border-r border-borderDark hidden md:flex flex-col">
        <div class="py-6 flex flex-col items-center justify-center px-4 border-b border-borderDark text-center">
            <div class="bg-white p-2 rounded-lg mb-3">
                <img src="https://upload.wikimedia.org/wikipedia/en/5/53/UiTM_logo.svg" alt="Logo UiTM" class="h-12 object-contain">
            </div>
            <h1 class="text-sm font-bold text-textMain tracking-wide uppercase">ICAN UiTM Dashboard</h1>
        </div>
        
        <div class="flex-1 overflow-y-auto py-6 px-4">
            <div class="mb-4 text-xs font-semibold text-textMuted uppercase tracking-wider">Peranan (Simulasi)</div>
            <nav class="space-y-2">
                <button onclick="switchRole('admin')" id="nav-admin" class="w-full flex items-center px-4 py-3 text-sm rounded-lg transition-colors bg-accentBlue text-white">
                    <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i> Admin
                </button>
                <button onclick="switchRole('faculty')" id="nav-faculty" class="w-full flex items-center px-4 py-3 text-sm rounded-lg text-textMuted hover:bg-darkBg hover:text-white transition-colors">
                    <i data-lucide="shield-check" class="w-5 h-5 mr-3"></i> Fakulti
                </button>
                <button onclick="switchRole('student')" id="nav-student" class="w-full flex items-center px-4 py-3 text-sm rounded-lg text-textMuted hover:bg-darkBg hover:text-white transition-colors">
                    <i data-lucide="graduation-cap" class="w-5 h-5 mr-3"></i> Pelajar
                </button>
                <button onclick="switchRole('company')" id="nav-company" class="w-full flex items-center px-4 py-3 text-sm rounded-lg text-textMuted hover:bg-darkBg hover:text-white transition-colors">
                    <i data-lucide="building-2" class="w-5 h-5 mr-3"></i> Syarikat
                </button>
            </nav>
        </div>
        
        <div class="p-4 border-t border-borderDark">
            <div class="flex items-center">
                <div class="w-8 h-8 rounded-full bg-accentBlue flex items-center justify-center text-white font-bold text-sm mr-3">
                    <span id="user-initial">A</span>
                </div>
                <div>
                    <p class="text-sm font-medium" id="user-name">Pentadbir Sistem</p>
                    <p class="text-xs text-textMuted" id="user-role-label">Admin</p>
                </div>
            </div>
        </div>
        
        <div class="p-4 border-t border-borderDark bg-darkBg text-xs text-center text-textMuted">
            <p class="text-[10px] uppercase tracking-wider mb-1">Pemilik Sistem</p>
            <p class="font-bold text-white mb-2">Muhammad Bazli Shah Bin Shahudin</p>
            <div class="border-t border-borderDark pt-2 space-y-1">
                <p>Penyelia: <span class="text-white font-medium">Dr Bibi Intan Suraya Murat</span></p>
                <p>Tempat: <span class="text-white font-medium">ICAN UiTM</span></p>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full relative">
        
        <header class="h-16 bg-cardBg border-b border-borderDark flex items-center justify-between px-4 md:px-8">
            <div class="flex items-center md:hidden">
                <div class="bg-white p-1 rounded mr-2">
                    <img src="https://upload.wikimedia.org/wikipedia/en/5/53/UiTM_logo.svg" alt="Logo UiTM" class="h-6 object-contain">
                </div>
                <h1 class="text-sm font-bold">ICAN UiTM</h1>
            </div>
            
            <div class="hidden md:flex items-center text-sm text-textMuted">
                <span>Papan Pemuka / <strong class="text-textMain" id="breadcrumb-current">Admin</strong></span>
            </div>
            
            <div class="flex items-center gap-4">
                <select onchange="switchRole(this.value)" class="md:hidden bg-darkBg border border-borderDark text-sm rounded-lg px-3 py-2 focus:outline-none focus:border-accentBlue">
                    <option value="admin">Admin</option>
                    <option value="faculty">Fakulti</option>
                    <option value="student">Pelajar</option>
                    <option value="company">Syarikat</option>
                </select>
                
                <button class="text-textMuted hover:text-white transition-colors relative">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span class="absolute top-0 right-0 w-2 h-2 bg-accentBlue rounded-full"></span>
                </button>
            </div>
        </header>

        <main id="main-content" class="flex-1 overflow-y-auto p-4 md:p-8 bg-darkBg text-textMain">
            </main>
    </div>

    <script>
        // --- DUMMY DATA ---
        const dummyData = {
            stats: { totalStudents: 1250, totalCompanies: 145, activeJobs: 320, pendingApprovals: 24 },
            jobs: [
                { id: 1, title: 'Jurutera Perisian (Intern)', company: 'TechAsia Sdn Bhd', location: 'Kuala Lumpur', type: 'Hybrid', status: 'pending' },
                { id: 2, title: 'Penganalisis Data', company: 'DataCorp', location: 'Cyberjaya', type: 'On-site', status: 'approved' },
                { id: 3, title: 'Pereka UI/UX', company: 'CreativeMinds', location: 'Remote', type: 'Remote', status: 'approved' }
            ],
            evaluations: [
                { student: 'Ahmad Ali bin Abu', company: 'TechAsia Sdn Bhd', score: 'Cemerlang', feedback: 'Pelajar menunjukkan kemahiran teknikal yang sangat baik dan proaktif.' },
                { student: 'Siti Nurhaliza', company: 'DataCorp', score: 'Baik', feedback: 'Boleh bekerja dalam kumpulan tetapi perlukan bimbingan dalam SQL.' }
            ],
            studentProfile: {
                name: 'Ahmad Ali bin Abu',
                university: 'Universiti Teknologi MARA (UiTM)',
                course: 'Ijazah Sarjana Muda Sains Komputer',
                skills: ['HTML', 'CSS', 'JavaScript', 'React', 'Tailwind'],
                resumeUploaded: true
            }
        };

        let currentChart = null;

        // --- RENDER FUNCTIONS ---

        function renderAdmin() {
            return `
                <div class="fade-in">
                    <h2 class="text-2xl font-bold mb-6">Ringkasan Keseluruhan ICAN UiTM</h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                        <div class="bg-cardBg p-6 rounded-xl border border-borderDark flex items-center justify-between">
                            <div>
                                <p class="text-sm text-textMuted mb-1">Jumlah Pelajar</p>
                                <h3 class="text-3xl font-bold text-white">${dummyData.stats.totalStudents}</h3>
                            </div>
                            <div class="w-12 h-12 bg-blue-500/10 rounded-full flex items-center justify-center text-accentBlue">
                                <i data-lucide="users"></i>
                            </div>
                        </div>
                        <div class="bg-cardBg p-6 rounded-xl border border-borderDark flex items-center justify-between">
                            <div>
                                <p class="text-sm text-textMuted mb-1">Syarikat Berdaftar</p>
                                <h3 class="text-3xl font-bold text-white">${dummyData.stats.totalCompanies}</h3>
                            </div>
                            <div class="w-12 h-12 bg-green-500/10 rounded-full flex items-center justify-center text-green-500">
                                <i data-lucide="building-2"></i>
                            </div>
                        </div>
                        <div class="bg-cardBg p-6 rounded-xl border border-borderDark flex items-center justify-between">
                            <div>
                                <p class="text-sm text-textMuted mb-1">Peluang Aktif</p>
                                <h3 class="text-3xl font-bold text-white">${dummyData.stats.activeJobs}</h3>
                            </div>
                            <div class="w-12 h-12 bg-purple-500/10 rounded-full flex items-center justify-center text-purple-500">
                                <i data-lucide="briefcase"></i>
                            </div>
                        </div>
                        <div class="bg-cardBg p-6 rounded-xl border border-borderDark flex items-center justify-between">
                            <div>
                                <p class="text-sm text-textMuted mb-1">Menunggu Kelulusan</p>
                                <h3 class="text-3xl font-bold text-white">${dummyData.stats.pendingApprovals}</h3>
                            </div>
                            <div class="w-12 h-12 bg-orange-500/10 rounded-full flex items-center justify-center text-orange-500">
                                <i data-lucide="clock"></i>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="bg-cardBg p-6 rounded-xl border border-borderDark">
                            <h3 class="text-lg font-semibold mb-4">Statistik Penempatan Pelajar</h3>
                            <canvas id="placementChart" height="250"></canvas>
                        </div>
                        <div class="bg-cardBg p-6 rounded-xl border border-borderDark">
                            <h3 class="text-lg font-semibold mb-4">Pendaftaran Syarikat Baharu</h3>
                            <canvas id="companyChart" height="250"></canvas>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderFaculty() {
            let pendingJobsHtml = dummyData.jobs.map(job => `
                <tr class="border-b border-borderDark hover:bg-darkBg transition-colors">
                    <td class="py-4 px-4 font-medium">${job.title}</td>
                    <td class="py-4 px-4 text-textMuted">${job.company}</td>
                    <td class="py-4 px-4">
                        <span class="px-3 py-1 rounded-full text-xs font-medium ${job.status === 'pending' ? 'bg-orange-500/10 text-orange-500' : 'bg-green-500/10 text-green-500'}">
                            ${job.status === 'pending' ? 'Menunggu' : 'Diluluskan'}
                        </span>
                    </td>
                    <td class="py-4 px-4 text-right">
                        ${job.status === 'pending' ? `
                            <button class="px-3 py-1 bg-accentBlue text-white text-xs rounded hover:bg-accentBlueHover transition-colors mr-2">Lulus</button>
                            <button class="px-3 py-1 bg-red-500/10 text-red-500 text-xs rounded hover:bg-red-500 hover:text-white transition-colors">Tolak</button>
                        ` : '<span class="text-xs text-textMuted">Tiada Tindakan</span>'}
                    </td>
                </tr>
            `).join('');

            let evaluationsHtml = dummyData.evaluations.map(ev => `
                <div class="p-4 bg-darkBg rounded-lg border border-borderDark mb-3">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-semibold text-white">${ev.student}</h4>
                        <span class="px-2 py-1 bg-accentBlue/20 text-accentBlue text-xs rounded-md">${ev.score}</span>
                    </div>
                    <p class="text-sm text-textMuted text-sm mb-1"><i data-lucide="building" class="w-3 h-3 inline mr-1"></i> ${ev.company}</p>
                    <p class="text-sm text-gray-400 italic">"${ev.feedback}"</p>
                </div>
            `).join('');

            return `
                <div class="fade-in space-y-8">
                    <div>
                        <h2 class="text-2xl font-bold mb-6">Kelulusan Pengiklanan Latihan Industri (ICAN UiTM)</h2>
                        <div class="bg-cardBg rounded-xl border border-borderDark overflow-hidden">
                            <div class="overflow-x-auto">
                                <table class="w-full text-left text-sm">
                                    <thead class="bg-darkBg text-textMuted uppercase text-xs">
                                        <tr>
                                            <th class="py-3 px-4">Jawatan</th>
                                            <th class="py-3 px-4">Syarikat</th>
                                            <th class="py-3 px-4">Status</th>
                                            <th class="py-3 px-4 text-right">Tindakan</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${pendingJobsHtml}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <div>
                        <h2 class="text-2xl font-bold mb-6">Penilaian Pelajar oleh Syarikat</h2>
                        <div class="bg-cardBg p-6 rounded-xl border border-borderDark grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${evaluationsHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderStudent() {
            let skillsHtml = dummyData.studentProfile.skills.map(skill => 
                `<span class="px-3 py-1 bg-darkBg border border-borderDark text-textMuted rounded-full text-xs">${skill}</span>`
            ).join('');

            let availableJobsHtml = dummyData.jobs.filter(j => j.status === 'approved').map(job => `
                <div class="p-5 bg-cardBg rounded-xl border border-borderDark hover:border-accentBlue transition-colors group cursor-pointer flex flex-col justify-between h-full">
                    <div>
                        <h4 class="font-bold text-lg text-white group-hover:text-accentBlue transition-colors">${job.title}</h4>
                        <p class="text-sm text-textMuted mb-3">${job.company}</p>
                        <div class="flex items-center gap-3 text-xs text-textMuted mb-4">
                            <span class="flex items-center"><i data-lucide="map-pin" class="w-3 h-3 mr-1"></i> ${job.location}</span>
                            <span class="flex items-center"><i data-lucide="laptop" class="w-3 h-3 mr-1"></i> ${job.type}</span>
                        </div>
                    </div>
                    <button class="w-full py-2 bg-darkBg border border-borderDark text-white text-sm rounded-lg hover:bg-accentBlue hover:border-accentBlue transition-colors">Mohon Sekarang</button>
                </div>
            `).join('');

            return `
                <div class="fade-in grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-1 space-y-6">
                        <div class="bg-cardBg p-6 rounded-xl border border-borderDark text-center">
                            <div class="w-24 h-24 bg-accentBlue rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-bold text-white">AA</div>
                            <h3 class="font-bold text-xl">${dummyData.studentProfile.name}</h3>
                            <p class="text-sm text-textMuted mb-4">${dummyData.studentProfile.course}</p>
                            <p class="text-xs text-textMuted bg-darkBg py-2 rounded-lg mb-4"><i data-lucide="school" class="inline w-3 h-3"></i> ${dummyData.studentProfile.university}</p>
                            
                            <div class="text-left mb-4">
                                <h4 class="text-sm font-semibold mb-2">Kemahiran</h4>
                                <div class="flex flex-wrap gap-2">
                                    ${skillsHtml}
                                </div>
                            </div>
                            
                            <button class="w-full flex items-center justify-center py-2 bg-darkBg border border-borderDark text-sm rounded-lg hover:bg-white hover:text-black transition-colors">
                                <i data-lucide="file-text" class="w-4 h-4 mr-2"></i> ${dummyData.studentProfile.resumeUploaded ? 'Kemaskini Resume' : 'Muat Naik Resume'}
                            </button>
                        </div>
                    </div>

                    <div class="lg:col-span-2">
                        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                            <h2 class="text-2xl font-bold">Cari Tempat Intern</h2>
                            <div class="relative w-full md:w-64">
                                <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-textMuted"></i>
                                <input type="text" placeholder="Cari jawatan..." class="w-full bg-cardBg border border-borderDark text-white text-sm rounded-lg pl-9 pr-4 py-2 focus:outline-none focus:border-accentBlue">
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            ${availableJobsHtml}
                            <div class="p-5 bg-cardBg rounded-xl border border-borderDark flex flex-col items-center justify-center text-center opacity-70">
                                <i data-lucide="search" class="w-8 h-8 text-textMuted mb-2"></i>
                                <p class="text-sm text-textMuted">Lihat lebih banyak<br>peluang pekerjaan</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCompany() {
            let myJobsHtml = dummyData.jobs.map(job => `
                <div class="flex items-center justify-between p-4 bg-darkBg rounded-lg border border-borderDark">
                    <div>
                        <h4 class="font-semibold text-white">${job.title}</h4>
                        <p class="text-sm text-textMuted">${job.location} • ${job.type}</p>
                    </div>
                    <div class="text-right">
                        <span class="inline-block px-3 py-1 rounded-full text-xs font-medium mb-1 ${job.status === 'pending' ? 'bg-orange-500/10 text-orange-500' : 'bg-green-500/10 text-green-500'}">
                            ${job.status === 'pending' ? 'Menunggu Kelulusan' : 'Aktif (Beriklan)'}
                        </span>
                        <div class="flex justify-end gap-2 mt-1">
                            <button class="text-textMuted hover:text-white"><i data-lucide="edit" class="w-4 h-4"></i></button>
                            <button class="text-textMuted hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');

            return `
                <div class="fade-in grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-1">
                        <div class="bg-cardBg p-6 rounded-xl border border-borderDark">
                            <h3 class="text-lg font-bold mb-4">Iklan Baharu (Pelajar UiTM)</h3>
                            <form class="space-y-4" onsubmit="event.preventDefault(); alert('Iklan dihantar untuk kelulusan!');">
                                <div>
                                    <label class="block text-xs text-textMuted mb-1">Tajuk Jawatan</label>
                                    <input type="text" class="w-full bg-darkBg border border-borderDark rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accentBlue" placeholder="Cth: Web Developer Intern">
                                </div>
                                <div>
                                    <label class="block text-xs text-textMuted mb-1">Lokasi</label>
                                    <input type="text" class="w-full bg-darkBg border border-borderDark rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accentBlue" placeholder="Cth: Kuala Lumpur">
                                </div>
                                <div>
                                    <label class="block text-xs text-textMuted mb-1">Jenis Bekerja</label>
                                    <select class="w-full bg-darkBg border border-borderDark rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accentBlue">
                                        <option>Hybrid</option>
                                        <option>Remote (Bekerja dari rumah)</option>
                                        <option>On-site (Di pejabat)</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs text-textMuted mb-1">Keperluan & Skop</label>
                                    <textarea class="w-full bg-darkBg border border-borderDark rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accentBlue h-24" placeholder="Terangkan skop tugas..."></textarea>
                                </div>
                                <button type="submit" class="w-full py-2 bg-accentBlue text-white text-sm rounded-lg hover:bg-accentBlueHover transition-colors">
                                    Hantar Iklan
                                </button>
                            </form>
                        </div>
                    </div>

                    <div class="lg:col-span-2 space-y-8">
                        <div>
                            <div class="flex justify-between items-center mb-4">
                                <h2 class="text-xl font-bold">Iklan Jawatan Syarikat Anda</h2>
                                <span class="text-xs bg-darkBg px-2 py-1 rounded text-textMuted">Jumlah: ${dummyData.jobs.length}</span>
                            </div>
                            <div class="space-y-3">
                                ${myJobsHtml}
                            </div>
                        </div>

                        <div class="bg-cardBg p-6 rounded-xl border border-borderDark">
                            <h2 class="text-xl font-bold mb-4">Penilaian Pelajar Praktikal UiTM</h2>
                            <p class="text-sm text-textMuted mb-4">Isi borang penilaian bagi pelajar yang sedang/telah tamat menjalani latihan industri di syarikat anda.</p>
                            <button class="py-2 px-4 bg-darkBg border border-borderDark text-white text-sm rounded-lg hover:bg-white hover:text-black transition-colors flex items-center">
                                <i data-lucide="clipboard-signature" class="w-4 h-4 mr-2"></i> Mula Menilai Pelajar
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- CORE LOGIC ---

        function initCharts() {
            if(currentChart) {
                Chart.getChart("placementChart")?.destroy();
                Chart.getChart("companyChart")?.destroy();
            }

            Chart.defaults.color = '#94a3b8';
            Chart.defaults.borderColor = '#334155';

            const ctx1 = document.getElementById('placementChart');
            if (ctx1) {
                new Chart(ctx1, {
                    type: 'bar',
                    data: {
                        labels: ['Jan', 'Feb', 'Mac', 'Apr', 'Mei', 'Jun'],
                        datasets: [{
                            label: 'Pelajar Diserap',
                            data: [12, 19, 15, 25, 22, 30],
                            backgroundColor: '#3b82f6',
                            borderRadius: 4
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            }

            const ctx2 = document.getElementById('companyChart');
            if (ctx2) {
                new Chart(ctx2, {
                    type: 'line',
                    data: {
                        labels: ['Jan', 'Feb', 'Mac', 'Apr', 'Mei', 'Jun'],
                        datasets: [{
                            label: 'Syarikat Baharu',
                            data: [5, 10, 8, 15, 12, 20],
                            borderColor: '#10b981',
                            tension: 0.4,
                            fill: true,
                            backgroundColor: 'rgba(16, 185, 129, 0.1)'
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            }
        }

        function switchRole(role) {
            const contentDiv = document.getElementById('main-content');
            const breadcrumb = document.getElementById('breadcrumb-current');
            
            // Set user profile sidebar simulation
            const userLabel = document.getElementById('user-role-label');
            const userName = document.getElementById('user-name');
            const userInitial = document.getElementById('user-initial');

            // Reset active state di navigation (Desktop)
            ['admin', 'faculty', 'student', 'company'].forEach(r => {
                const btn = document.getElementById(`nav-${r}`);
                if(btn) {
                    btn.className = "w-full flex items-center px-4 py-3 text-sm rounded-lg text-textMuted hover:bg-darkBg hover:text-white transition-colors";
                }
            });

            const activeBtn = document.getElementById(`nav-${role}`);
            if(activeBtn) {
                activeBtn.className = "w-full flex items-center px-4 py-3 text-sm rounded-lg transition-colors bg-accentBlue text-white";
            }

            switch(role) {
                case 'admin':
                    contentDiv.innerHTML = renderAdmin();
                    breadcrumb.innerText = 'Admin';
                    userLabel.innerText = 'Pentadbir Sistem';
                    userName.innerText = 'Azman Sulaiman';
                    userInitial.innerText = 'A';
                    setTimeout(initCharts, 100);
                    break;
                case 'faculty':
                    contentDiv.innerHTML = renderFaculty();
                    breadcrumb.innerText = 'Fakulti';
                    userLabel.innerText = 'Penyelaras Latihan';
                    userName.innerText = 'Dr. Sarah Ahmad';
                    userInitial.innerText = 'S';
                    break;
                case 'student':
                    contentDiv.innerHTML = renderStudent();
                    breadcrumb.innerText = 'Pelajar';
                    userLabel.innerText = 'Pelajar Sarjana Muda';
                    userName.innerText = 'Ahmad Ali bin Abu';
                    userInitial.innerText = 'A';
                    break;
                case 'company':
                    contentDiv.innerHTML = renderCompany();
                    breadcrumb.innerText = 'Syarikat';
                    userLabel.innerText = 'Pengurus Sumber Manusia';
                    userName.innerText = 'TechAsia Sdn Bhd';
                    userInitial.innerText = 'T';
                    break;
            }

            // Re-render lucide icons setiap kali DOM bertukar
            lucide.createIcons();
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            switchRole('admin');
        });
    </script>
</body>
</html>
